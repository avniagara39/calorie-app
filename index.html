<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Счётчик калорий</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top left, #dff7ea, #f4f7fb 45%, #eef2ff);
    padding: 30px;
    color: #1f2937;
  }
  .app {
    max-width: 960px;
    margin: auto;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(10px);
    padding: 28px;
    border-radius: 24px;
    box-shadow: 0 18px 50px rgba(31,41,55,0.12);
  }
  h1 { text-align: center; margin: 0 0 8px; font-size: 34px; }
  .subtitle { text-align: center; color: #64748b; margin-bottom: 24px; }
  .form {
    display: grid;
    grid-template-columns: 1.8fr 0.8fr auto;
    gap: 12px;
    align-items: start;
    margin-bottom: 20px;
  }
  .field { position: relative; }
  input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 14px;
    border: 1px solid #d7dee8;
    outline: none;
    font-size: 16px;
    background: #fff;
    transition: 0.2s;
  }
  input:focus { border-color: #22c55e; box-shadow: 0 0 0 4px rgba(34,197,94,0.12); }
  button {
    border: none;
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    background: #16a34a;
    color: white;
    transition: 0.2s;
  }
  button:hover { transform: translateY(-1px); background: #15803d; }
  .suggestions {
    position: absolute;
    left: 0;
    right: 0;
    top: 56px;
    z-index: 10;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 16px 38px rgba(15,23,42,0.14);
    max-height: 300px;
    overflow-y: auto;
  }
  .suggestion {
    padding: 13px 15px;
    border-bottom: 1px solid #edf2f7;
    cursor: pointer;
    transition: 0.18s;
  }
  .suggestion:hover { background: #ecfdf5; padding-left: 22px; }
  .suggestion strong { display: block; }
  .suggestion small { color: #64748b; }
  .summary {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin: 22px 0;
  }
  .box {
    background: linear-gradient(180deg, #f8fafc, #eff6ff);
    border: 1px solid #e2e8f0;
    border-radius: 18px;
    padding: 16px;
    text-align: center;
  }
  .box span { display: block; font-size: 24px; font-weight: 800; margin-top: 6px; color: #0f172a; }
  .panel-title { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top: 18px; }
  .hint { color:#64748b; font-size:14px; }
  .item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    background: #fff;
    border: 1px solid #edf2f7;
    border-radius: 18px;
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: 0 8px 20px rgba(15,23,42,0.04);
  }
  .item b { font-size: 18px; }
  .meta { color:#475569; margin-top: 6px; line-height: 1.6; }
  .delete { background:#ef4444; padding:10px 13px; align-self:center; }
  .delete:hover { background:#dc2626; }
  .empty { text-align:center; color:#64748b; padding:24px; border:1px dashed #cbd5e1; border-radius:18px; }
  .notfound { margin-top: 8px; color:#b45309; font-size:14px; }
  @media (max-width: 760px) {
    body { padding: 14px; }
    .form { grid-template-columns: 1fr; }
    .summary { grid-template-columns: repeat(2, 1fr); }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="app">
  <h1>🥗 Счётчик калорий</h1>
  <div class="subtitle">Автопоиск по встроенной базе продуктов. Введи продукт, выбери подсказку и укажи граммы.</div>

  <div class="form">
    <div class="field">
      <input id="name" placeholder="Начни писать: огурец, хлеб, молоко..." autocomplete="off" oninput="showSuggestions()" onkeydown="handleEnter(event)" />
      <div id="suggestions" class="suggestions"></div>
      <div id="notfound" class="notfound"></div>
    </div>
    <input id="grams" type="number" min="1" placeholder="Граммы" onkeydown="handleEnter(event)" />
    <button onclick="addItem()">Добавить</button>
  </div>

  <div class="summary">
    <div class="box">Продуктов<span id="totalItems">0</span></div>
    <div class="box">Ккал<span id="totalCalories">0</span></div>
    <div class="box">Белки<span id="totalProtein">0 г</span></div>
    <div class="box">Жиры<span id="totalFat">0 г</span></div>
    <div class="box">Углеводы<span id="totalCarbs">0 г</span></div>
  </div>

  <div class="panel-title">
    <h2>Список блюд и продуктов</h2>
    <div class="hint">Данные примерные, на 100 г</div>
  </div>
  <div id="list"></div>
</div>

  "картофель жареный": {cal:192,p:2.8,f:9.5,c:23.4}, "картофель фри": {cal:312,p:3.4,f:15.0,c:41.0}, "сырники": {cal:220,p:14.0,f:10.0,c:18.0}, "блины": {cal:227,p:6.0,f:10.0,c:28.0}, "оладьи": {cal:230,p:6.0,f:9.0,c:32.0},

let items = [];
let selectedName = "";
function normalize(str){ return str.trim().toLowerCase().replace(/ё/g,"е"); }
function showSuggestions(){
  const input = normalize(document.getElementById('name').value);
  const box = document.getElementById('suggestions');
  const nf = document.getElementById('notfound');
  box.innerHTML = ''; nf.textContent=''; selectedName='';
  if(input.length < 1) return;
  const keys = Object.keys(foodDB);
  const matches = keys.filter(k => normalize(k).includes(input)).slice(0, 12);
  if(matches.length === 0){ nf.textContent = 'Пока нет в базе. Можно добавить этот продукт в foodDB в коде.'; return; }
  matches.forEach(name => {
    const d = foodDB[name];
    const div = document.createElement('div');
    div.className = 'suggestion';
    div.innerHTML = `<strong>${name}</strong><small>${d.cal} ккал · Б ${d.p} · Ж ${d.f} · У ${d.c} / 100 г</small>`;
    div.onclick = () => selectProduct(name);
    box.appendChild(div);
  });
}
function selectProduct(name){
  selectedName = name;
  document.getElementById('name').value = name;
  document.getElementById('suggestions').innerHTML = '';
  document.getElementById('notfound').textContent = '';
  document.getElementById('grams').focus();
}
function findProduct(name){
  const n = normalize(name);
  return Object.keys(foodDB).find(k => normalize(k) === n) || Object.keys(foodDB).find(k => normalize(k).includes(n));
}
function addItem(){
  const typed = document.getElementById('name').value;
  const grams = Number(document.getElementById('grams').value);
  const key = selectedName || findProduct(typed);
  if(!key || !foodDB[key]) { alert('Продукт не найден в базе. Выбери его из подсказки.'); return; }
  if(!grams || grams <= 0) { alert('Укажи количество граммов.'); return; }
  const d = foodDB[key];
  const factor = grams / 100;
  items.push({
    name:key, grams,
    calories: Math.round(d.cal * factor),
    protein: +(d.p * factor).toFixed(1),
    fat: +(d.f * factor).toFixed(1),
    carbs: +(d.c * factor).toFixed(1)
  });
  document.getElementById('name').value='';
  document.getElementById('grams').value='';
  selectedName='';
  document.getElementById('suggestions').innerHTML = '';
  document.getElementById('notfound').textContent = '';
  render();
}
function deleteItem(i){ items.splice(i,1); render(); }
function handleEnter(e){ if(e.key === 'Enter') addItem(); }
function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  let tc=0,tp=0,tf=0,tcar=0;
  items.forEach((it,i)=>{
    tc += it.calories; tp += it.protein; tf += it.fat; tcar += it.carbs;
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div><b>${it.name}</b> — ${it.grams} г<div class="meta">${it.calories} ккал · Белки ${it.protein} г · Жиры ${it.fat} г · Углеводы ${it.carbs} г</div></div><button class="delete" onclick="deleteItem(${i})">Удалить</button>`;
    list.appendChild(div);
  });
  if(items.length === 0) list.innerHTML = '<div class="empty">Пока ничего не добавлено. Начни с огурца — он парень скромный, но полезный.</div>';
  document.getElementById('totalItems').textContent = items.length;
  document.getElementById('totalCalories').textContent = Math.round(tc);
  document.getElementById('totalProtein').textContent = tp.toFixed(1) + ' г';
  document.getElementById('totalFat').textContent = tf.toFixed(1) + ' г';
  document.getElementById('totalCarbs').textContent = tcar.toFixed(1) + ' г';
}
render();
</script>
